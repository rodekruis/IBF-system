services:
  ibf-api-service:
    container_name: ibf-api-service
    build:
      context: ./services/API-service
      args:
        - NODE_ENV=${NODE_ENV}
    environment:
      - DUNANT_PASSWORD=${DUNANT_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - NODE_ENV=${NODE_ENV}
      - SECRET=${SECRET}
      - COUNTRIES=${COUNTRIES}
      - DISASTER_TYPES=${DISASTER_TYPES}
      - DASHBOARD_URL=${DASHBOARD_URL}
      - SUPPORT_EMAIL_ADDRESS=${SUPPORT_EMAIL_ADDRESS}
      - TWILIO_SID=${TWILIO_SID}
      - TWILIO_AUTHTOKEN=${TWILIO_AUTHTOKEN}
      - TWILIO_MESSAGING_SID=${TWILIO_MESSAGING_SID}
      - TWILIO_WHATSAPP_NUMBER=${TWILIO_WHATSAPP_NUMBER}
      - API_SERVICE_URL=${API_SERVICE_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
    ports:
      - 3000:3000
    volumes:
      - ibf-api-service-node-modules:/home/ibf/api-service/node_modules
      - ./services/API-service:/home/ibf/api-service
    networks:
      api-network:
    restart: unless-stopped

  ibf-dashboard:
    build:
      context: ./interfaces/IBF-dashboard
      args:
        - NG_CONFIGURATION=${NG_CONFIGURATION}
        - API_SERVICE_URL=${API_SERVICE_URL}
        - NG_USE_SERVICE_WORKER=${NG_USE_SERVICE_WORKER}
        - NG_GEOSERVER_URL=${NG_GEOSERVER_URL}
        - NG_IBF_SYSTEM_VERSION=${NG_IBF_SYSTEM_VERSION}
        - NG_IBF_VIDEO_GUIDE_URL=${NG_IBF_VIDEO_GUIDE_URL}
        - NG_IBF_PDF_GUIDE_URL=${NG_IBF_PDF_GUIDE_URL}
        - NG_APPLICATION_INSIGHTS_INSTRUMENTATION_KEY=${NG_APPLICATION_INSIGHTS_INSTRUMENTATION_KEY}
        - NG_APPLICATION_INSIGHTS_URL=${NG_APPLICATION_INSIGHTS_URL}
        - SUPPORT_EMAIL_ADDRESS=${SUPPORT_EMAIL_ADDRESS}
        - WHATS_NEW_URL=${WHATS_NEW_URL}
    environment:
      - NG_CONFIGURATION=${NG_CONFIGURATION}
      - API_SERVICE_URL=${API_SERVICE_URL}
      - NG_USE_SERVICE_WORKER=${NG_USE_SERVICE_WORKER}
      - NG_GEOSERVER_URL=${NG_GEOSERVER_URL}
      - NG_IBF_SYSTEM_VERSION=${NG_IBF_SYSTEM_VERSION}
      - NG_IBF_VIDEO_GUIDE_URL=${NG_IBF_VIDEO_GUIDE_URL}
      - NG_IBF_PDF_GUIDE_URL=${NG_IBF_PDF_GUIDE_URL}
      - NG_APPLICATION_INSIGHTS_INSTRUMENTATION_KEY=${NG_APPLICATION_INSIGHTS_INSTRUMENTATION_KEY}
      - NG_APPLICATION_INSIGHTS_URL=${NG_APPLICATION_INSIGHTS_URL}
      - SUPPORT_EMAIL_ADDRESS=${SUPPORT_EMAIL_ADDRESS}
      - WHATS_NEW_URL=${WHATS_NEW_URL}
    volumes:
      - ibf-dashboard-node-modules:/home/node/app/node_modules
      - ./interfaces/IBF-dashboard/www:/home/node/app/_www

  ibf-geoserver:
    container_name: ibf-geoserver
    image: docker.osgeo.org/geoserver:2.28.2
    # TODO: compare with the setttings here as well: https://github.com/geoserver/docker/blob/master/docker-compose-demo.yml
    environment: # see https://docs.geoserver.org/latest/en/user/installation/docker.html for more details
      - INSTALL_EXTENSIONS=true
      - STABLE_EXTENSIONS=vectortiles,importer,control-flow
      - GEOSERVER_ADMIN_USER=admin
      - GEOSERVER_ADMIN_PASSWORD=${GEOSERVER_ADMIN_PASSWORD}
      - CATALINA_OPTS="-DALLOW_ENV_PARAMETRIZATION=true" # Allow config changes https://docs.geoserver.org/latest/en/user/datadirectory/configtemplate.html
      #- PROXY_BASE_URL=${DASHBOARD_URL}/geoserver #disable to be able to log in to GeoServer. This line causes an incorrect redirect.
      - GEOSERVER_CSRF_DISABLED=true # turn off CSRF protection (formerly needed for API calls to work)
      - SKIP_DEMO_DATA=true
      - GEOSERVER_LOG_LEVEL=DEBUG
      #- CORS_ENABLED=true #not needed it seems
    ports:
      - 8081:8080
    volumes:
      - ./services/API-service/geoserver-volume/data:/opt/geoserver_data/data # Persist data dir
      #- original
      - ./services/API-service/geoserver-volume/geoserver-layers:/opt/geoserver_data/workspaces/ibf-system
      - ./services/API-service/geoserver-volume/raster-files:/opt/geoserver_data/workspaces/ibf-system/ibf-pipeline
      # test
      #- ./services/API-service/geoserver-volume/raster-files:/opt/geoserver_data/data/ibf-pipeline
      #- ./services/API-service/geoserver-volume/geoserver-layers:/opt/geoserver_data/data
      # test with rasters in data
      #- ./services/API-service/geoserver-volume/raster-files:/opt/geoserver_data/data
      #- ./services/API-service/geoserver-volume/geoserver-layers:/opt/geoserver_data/workspaces/ibf-system
      - ./.env:/opt/geoserver/data_dir/geoserver-environment.properties
      # LLM: Mount custom web.xml with CORS configuration
      #- ./services/API-service/geoserver-volume/config:/opt/config_overrides #:ro
    networks:
      api-network:
    restart: unless-stopped

volumes:
  ibf-api-service-node-modules:
  ibf-dashboard-node-modules:

networks:
  api-network:
    driver: bridge
